services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: testpass
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: wppass
    ports:
      - "13306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  wordpress:
    image: ant-press-wp-test
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppass
      WORDPRESS_DB_NAME: wordpress
      WP_HOME: http://localhost:18080
      WP_SITEURL: http://localhost:18080
      WP_SITE_TITLE: "Test ANT-Press Site"
      WP_ADMIN_USER: admin
      WP_ADMIN_EMAIL: admin@test.local
    ports:
      - "18080:80"
